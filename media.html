<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Media Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body {font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; max-width: 900px; margin: 2rem auto; padding: 0 1rem;}
            .media {margin-bottom: 1.5rem;}
            video, audio, iframe {max-width: 100%; height: auto;}
        </style>
    </head>
    <body>
        <h1>Media</h1>
        <section class="media">
            <h2>HTML5 Video</h2>
            <video controls width="720" preload="metadata">
                <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
                Your browser doe not support this video. Download the video. <a href="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"> here.</a>            </video>
        </section>
        <section class="media">
            <h2>Audio Player</h2>
            <audio controls preload="metadata">
                <source src="https://interactive-examples.mdn.mozilla.net/media/examples/t-rex-roar.mp3" type="audio/mpeg">
                Your browser does not support the audio element. Download audio <a href="https://interactive-examples.mdn.mozilla.net/media/examples/t-rex-roar.mp3"> here.</a>
            </audio>
        </section>
        <section class="media">
            <h2>Youtube Embed</h2>
            <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0&controls=1&modestbranding=1&enablejsapi=1&autoplay=0" title="Youtube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe>
            </div>
            <p>Note: autoplay is disabled to respect user preference; the player includes controls and limited branding.</p>
        </section>
    </body
</html>
